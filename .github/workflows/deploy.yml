name: Deploy
on: workflow_dispatch
jobs:
  deploy-website:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install OSC CLI
        run: npm install -g @osaas/cli
      - name: Deploy to MinIO
        env:
          OSC_ACCESS_TOKEN: ${{ secrets.OSC_ACCESS_TOKEN }}
        run: osc web publish basket . --sync
